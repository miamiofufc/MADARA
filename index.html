<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>MADARA UCHIHA · PREDICTION AI</title>
  <!-- Tailwind + Google Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,700;14..32,800&family=Rajdhani:wght@400;600;700;800&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <!-- React and Babel -->
  <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    html, body, #root {
      height: 100%;
      width: 100%;
      overflow: hidden;
      position: fixed;
      top: 0;
      left: 0;
      background: #0a0000;
      color: #fff;
      font-family: 'Inter', 'Rajdhani', system-ui, sans-serif;
    }
    .blood-bg { background: radial-gradient(circle at 10% 20%, #1a0303 0%, #000000 100%); }
    .blood-text {
      font-family: 'Rajdhani', system-ui, sans-serif;
      font-weight: 800;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ff3a3a 0%, #ff1a1a 40%, #8b0000 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 8px rgba(255, 0, 0, 0.3);
      letter-spacing: 1px;
    }
    .card-red-glow {
      background: linear-gradient(145deg, rgba(100, 10, 10, 0.25) 0%, rgba(30, 0, 0, 0.6) 100%);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(220, 38, 38, 0.5);
      border-radius: 28px;
    }
    .btn-blood {
      background: linear-gradient(95deg, #b91c1c 0%, #7f1a1a 100%);
      border: none;
      color: white;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-radius: 40px;
      padding: 14px 24px;
      width: 100%;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(185, 28, 28, 0.4);
    }
    .btn-blood:active { transform: scale(0.97); background: linear-gradient(95deg, #9f1a1a 0%, #5f0e0e 100%); }
    .mode-switch {
      background: rgba(0,0,0,0.6);
      border-radius: 60px;
      padding: 5px;
      display: flex;
      gap: 8px;
      border: 1px solid rgba(220, 38, 38, 0.5);
    }
    .mode-option {
      flex: 1;
      text-align: center;
      padding: 10px 0;
      font-weight: 800;
      font-size: 14px;
      border-radius: 50px;
      cursor: pointer;
      background: transparent;
      color: #9ca3af;
    }
    .mode-option.active { background: #b91c1c; color: white; box-shadow: 0 0 12px #ff3a3a; }
    .sharingan-container {
      width: 190px;
      height: 190px;
      border-radius: 50%;
      position: relative;
      margin: 0 auto;
      cursor: pointer;
      animation: subtlePulse 2s ease-in-out infinite;
    }
    .sharingan-base {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle, #8b0000 0%, #3a0000 70%, #1a0000 100%);
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.6), inset 0 0 20px rgba(0,0,0,0.5);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tomoe {
      position: absolute;
      width: 36px;
      height: 36px;
      background: radial-gradient(circle at 30% 35%, #000000 40%, #1a0000 80%);
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(0,0,0,0.8);
    }
    .tomoe::before {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      background: #ff1a1a;
      border-radius: 50%;
      top: 8px;
      left: 8px;
      box-shadow: 0 0 4px #ff4444;
    }
    .tomoe-1 { top: 12px; left: 50%; transform: translateX(-50%); }
    .tomoe-2 { bottom: 12px; left: 20px; transform: rotate(120deg); }
    .tomoe-3 { bottom: 12px; right: 20px; transform: rotate(240deg); }
    .sharingan-pupil {
      width: 45px;
      height: 45px;
      background: radial-gradient(circle, #000000 0%, #1a0000 80%);
      border-radius: 50%;
      border: 2px solid #8b0000;
      box-shadow: 0 0 15px rgba(255,0,0,0.5);
      z-index: 10;
      animation: pupilGlow 1.5s ease-in-out infinite alternate;
    }
    .sharingan-ring {
      position: absolute;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 2px solid rgba(255, 50, 50, 0.6);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: spinRing 8s linear infinite;
    }
    @keyframes spinRing { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }
    @keyframes pupilGlow {
      0% { box-shadow: 0 0 5px rgba(255,0,0,0.3); width: 42px; height: 42px; }
      100% { box-shadow: 0 0 20px rgba(255,0,0,0.8); width: 48px; height: 48px; }
    }
    @keyframes subtlePulse {
      0% { transform: scale(0.98); opacity: 0.9; }
      50% { transform: scale(1.02); opacity: 1; }
      100% { transform: scale(0.98); opacity: 0.9; }
    }
    .prediction-result-text {
      font-size: 28px;
      font-weight: 900;
      text-shadow: 0 0 20px #ff0000;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #fff0f0, #ff6666);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: resultPulse 1s ease-out;
    }
    @keyframes resultPulse {
      0% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 1; transform: scale(1.2); }
      100% { opacity: 1; transform: scale(1); }
    }
    .timer-display {
      font-size: 48px;
      font-weight: 900;
      color: #ff1a1a;
      text-shadow: 0 0 20px #ff0000;
      font-family: 'Orbitron', monospace;
      text-align: center;
    }
    .number-ball {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(145deg, #1a0000, #3a0000);
      border: 2px solid #ff3333;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 900;
      color: #fff;
      box-shadow: 0 0 20px rgba(255, 51, 51, 0.5);
    }
    .toast-message {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: #b91c1c;
      color: white;
      padding: 10px 20px;
      border-radius: 40px;
      font-weight: bold;
      z-index: 9999;
      opacity: 0;
      transition: 0.2s;
      pointer-events: none;
    }
    .toast-message.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }
    .scroll-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 20px 16px 90px 16px;
      -webkit-overflow-scrolling: touch;
    }
    .bottom-nav-blood {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #040000e6;
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(185, 28, 28, 0.6);
      padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
      z-index: 1000;
    }
    .nav-item-blood {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: #6b7280;
      font-size: 9px;
      font-weight: 700;
      cursor: pointer;
    }
    .nav-item-blood.active { color: #ff4d4d; text-shadow: 0 0 4px #ff0000; }
    .history-item-blood {
      background: rgba(60, 10, 10, 0.5);
      border-left: 4px solid;
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .history-item-blood.win { border-left-color: #ff4d4d; background: rgba(185, 28, 28, 0.15); }
    .history-item-blood.loss { border-left-color: #7f1a1a; background: rgba(80, 0, 0, 0.3); }
    .dialog-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .dialog-card {
      background: linear-gradient(145deg, #1e0505, #080000);
      border: 2px solid #b91c1c;
      border-radius: 48px;
      max-width: 320px;
      width: 85%;
      padding: 28px 20px 32px;
      box-shadow: 0 0 40px rgba(185, 28, 28, 0.6);
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useRef } = React;
  
  // === FIREBASE CONFIG (REST API) ===
  const FIREBASE_DB_URL = "https://madara-27569-default-rtdb.firebaseio.com";
  
  // === CONSTANTS ===
  const REGISTER_URL = "https://13l.bio/register?inviteCode=GP8SMEN&from=web";
  const TELEGRAM_ADMIN = "https://t.me/GAINEO";
  const TELEGRAM_CHANNEL = "https://t.me/FREE_TOOL_76"; // original
  
  // Device ID generator
  function getDeviceId() {
    let deviceId = localStorage.getItem('madara_device_id');
    if (!deviceId) {
      deviceId = 'MADARA_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9).toUpperCase();
      localStorage.setItem('madara_device_id', deviceId);
    }
    return deviceId;
  }

  // Toast helper
  function showToast(msg, isBlood = false) {
    let toast = document.getElementById('global-toast');
    if (!toast) {
      toast = document.createElement('div');
      toast.id = 'global-toast';
      toast.className = 'toast-message';
      document.body.appendChild(toast);
    }
    toast.textContent = msg;
    toast.classList.add('show');
    if (isBlood) {
      toast.style.background = "#8b0000";
      setTimeout(() => toast.style.background = "#b91c1c", 500);
    }
    setTimeout(() => toast.classList.remove('show'), 2200);
  }

  // IST helpers
  const getISTTime = () => {
    const now = new Date();
    const utc = now.getTime() + (now.getTimezoneOffset() * 60 * 1000);
    const istOffset = 330 * 60 * 1000;
    return new Date(utc + istOffset);
  };
  const calculateTimer = (mode) => {
    const istNow = getISTTime();
    const seconds = istNow.getSeconds();
    return mode === '30S' ? 29 - (seconds % 30) : 59 - seconds;
  };

  // Prediction API endpoints
  const API_URLS = {
    '30S': 'https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json',
    '1M': 'https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json'
  };

  // SDD Prediction Logic (unchanged)
  function generateSDDPrediction(lastTwoResults, nextPeriod) {
    const r1 = parseInt(lastTwoResults[0].number);
    const r2 = parseInt(lastTwoResults[1].number);
    const periodSuffix = parseInt(nextPeriod.slice(-4));
    const gap = Math.abs(r1 - r2);
    const v1 = (gap % 2 === 0) ? (r1 >= 5 ? 'BIG' : 'SMALL') : (r1 >= 5 ? 'SMALL' : 'BIG');
    const lb = r1 >= 5 ? 'BIG' : 'SMALL';
    const pb = r2 >= 5 ? 'BIG' : 'SMALL';
    const v2 = (lb === pb) ? lb : (lb === 'BIG' ? 'SMALL' : 'BIG');
    const ts = periodSuffix + new Date().getMinutes();
    const v3 = (ts % 2 === 0) ? 'SMALL' : 'BIG';
    const wv = Math.sin(periodSuffix * (r1 + 1));
    const v4 = (wv >= 0) ? 'BIG' : 'SMALL';
    const trendStable = (r1 >= 5 && r2 >= 5) || (r1 < 5 && r2 < 5);
    const v5 = trendStable ? (r1 >= 5 ? 'BIG' : 'SMALL') : (gap > 5 ? 'BIG' : 'SMALL');
    let bigCount = 0, smallCount = 0;
    [v1, v2, v3, v4, v5].forEach(v => { if(v === 'BIG') bigCount++; else smallCount++; });
    let finalPred = (bigCount === smallCount) ? v4 : (bigCount > smallCount ? 'BIG' : 'SMALL');
    const isBig = (finalPred === 'BIG');
    let rawNum = Math.floor(Math.abs(wv) * 1000) % 10;
    let n1 = rawNum;
    if(isBig) { if(n1 < 5) n1 += 5; } else { if(n1 >= 5) n1 -= 5; }
    let n2 = (n1 + 5) % 10;
    return { result: finalPred, number1: n1, number2: n2, confidence: Math.floor(Math.random() * 15) + 85 };
  }

  // === MAIN APP COMPONENT ===
  const App = () => {
    const [deviceId] = useState(getDeviceId);
    const [approvalStatus, setApprovalStatus] = useState(null); // null, 'pending', 'approved', 'rejected'
    const [showUidModal, setShowUidModal] = useState(false);
    const [uidInput, setUidInput] = useState('');
    const [isSubmitting, setIsSubmitting] = useState(false);
    
    // Main app states (only used when approved)
    const [activeTab, setActiveTab] = useState('dashboard');
    const [gameMode, setGameMode] = useState('30S');
    const [predictionsMap, setPredictionsMap] = useState({ '30S': null, '1M': null });
    const [periodsMap, setPeriodsMap] = useState({ '30S': '...', '1M': '...' });
    const [isAnalyzing, setIsAnalyzing] = useState(false);
    const [stats, setStats] = useState({ wins: 0, losses: 0, accuracy: 0, total: 0 });
    const [history, setHistory] = useState([]);
    const [predictionReveal, setPredictionReveal] = useState(false);
    const [timer, setTimer] = useState(30);
    const lastProcessedPeriodRef = useRef({ '30S': null, '1M': null });
    const checkedResultsRef = useRef(new Set());

    // Check approval status on mount and periodically
    const checkApprovalStatus = async () => {
      try {
        // First check approved list
        const approvedRes = await fetch(`${FIREBASE_DB_URL}/approved/${deviceId}.json`);
        const approvedData = await approvedRes.json();
        if (approvedData) {
          setApprovalStatus('approved');
          return;
        }
        // Check request status
        const reqRes = await fetch(`${FIREBASE_DB_URL}/requests/${deviceId}.json`);
        const reqData = await reqRes.json();
        if (reqData) {
          if (reqData.status === 'approved') {
            // Move to approved (admin might have moved it)
            await fetch(`${FIREBASE_DB_URL}/approved/${deviceId}.json`, {
              method: 'PUT',
              body: JSON.stringify({ uid: reqData.uid, timestamp: reqData.timestamp })
            });
            setApprovalStatus('approved');
          } else if (reqData.status === 'rejected') {
            setApprovalStatus('rejected');
          } else {
            setApprovalStatus('pending');
          }
        } else {
          setApprovalStatus(null); // no request yet
        }
      } catch (e) {
        console.warn("Approval check error", e);
      }
    };

    useEffect(() => {
      checkApprovalStatus();
      const interval = setInterval(checkApprovalStatus, 5000);
      return () => clearInterval(interval);
    }, [deviceId]);

    const submitUidRequest = async () => {
      if (!uidInput.trim() || !/^\d+$/.test(uidInput)) {
        showToast('Please enter a valid numeric UID');
        return;
      }
      setIsSubmitting(true);
      try {
        const requestData = {
          uid: uidInput.trim(),
          deviceId,
          status: 'pending',
          timestamp: Date.now()
        };
        await fetch(`${FIREBASE_DB_URL}/requests/${deviceId}.json`, {
          method: 'PUT',
          body: JSON.stringify(requestData)
        });
        setApprovalStatus('pending');
        setShowUidModal(false);
        showToast('Request sent! Waiting for admin approval.', true);
      } catch (e) {
        showToast('Error submitting request. Try again.');
      } finally {
        setIsSubmitting(false);
      }
    };

    // Timer sync (only if approved)
    useEffect(() => {
      if (approvalStatus !== 'approved') return;
      const updateTimer = () => setTimer(calculateTimer(gameMode));
      updateTimer();
      const interval = setInterval(updateTimer, 1000);
      return () => clearInterval(interval);
    }, [approvalStatus, gameMode]);

    // Prediction fetch logic (only if approved)
    useEffect(() => {
      if (approvalStatus !== 'approved') return;
      
      const generatePrediction = (period, lastTwo) => {
        if (isAnalyzing) return;
        setIsAnalyzing(true);
        setPredictionReveal(false);
        setTimeout(() => {
          const pred = generateSDDPrediction(lastTwo, period);
          const newPred = { 
            result: pred.result, 
            numbers: [pred.number1, pred.number2], 
            confidence: pred.confidence, 
            period, 
            mode: gameMode, 
            timestamp: Date.now(), 
            status: 'WAIT' 
          };
          setPredictionsMap(prev => ({ ...prev, [gameMode]: newPred }));
          setPredictionReveal(true);
          setIsAnalyzing(false);
          setHistory(prev => { 
            const exists = prev.find(h => h.period === period); 
            if (!exists) return [newPred, ...prev].slice(0, 50); 
            return prev; 
          });
        }, 800);
      };

      const fetchData = async () => {
        try {
          const url = API_URLS[gameMode] + '?t=' + Date.now();
          const res = await fetch(url);
          const json = await res.json();
          if (json?.data?.list) {
            const list = json.data.list;
            const nextPeriod = (BigInt(list[0].issueNumber) + 1n).toString();
            setPeriodsMap(prev => ({ ...prev, [gameMode]: nextPeriod }));
            
            const currentPred = predictionsMap[gameMode];
            if (currentPred && currentPred.period !== '...' && currentPred.status === 'WAIT') {
              const resultEntry = list.find(item => item.issueNumber === currentPred.period);
              if (resultEntry && !checkedResultsRef.current.has(currentPred.period)) {
                checkedResultsRef.current.add(currentPred.period);
                const resultNumber = parseInt(resultEntry.number);
                const isWin = (currentPred.result === 'BIG' && resultNumber >= 5) || (currentPred.result === 'SMALL' && resultNumber < 5);
                const isJackpot = currentPred.numbers?.includes(resultNumber);
                let status = isJackpot ? 'JACKPOT' : (isWin ? 'WIN' : 'LOSS');
                setHistory(prev => prev.map(h => h.period === currentPred.period ? { ...h, status, actualNumber: resultNumber } : h));
                setStats(prevStats => {
                  let newWins = prevStats.wins, newLosses = prevStats.losses;
                  if (isWin || isJackpot) newWins++; else newLosses++;
                  const newTotal = newWins + newLosses;
                  const newAccuracy = newTotal > 0 ? Math.round((newWins / newTotal) * 100) : 0;
                  return { wins: newWins, losses: newLosses, total: newTotal, accuracy: newAccuracy };
                });
                showToast(isWin || isJackpot ? `🎉 ${status}! ${currentPred.period} → ${currentPred.result} ✅` : `💀 DEFEAT! ${currentPred.period} → ${currentPred.result} ❌`, true);
                setPredictionsMap(prev => ({ ...prev, [gameMode]: null }));
                setPredictionReveal(false);
              }
            }
            const lastProcessed = lastProcessedPeriodRef.current[gameMode];
            if (lastProcessed !== nextPeriod) {
              lastProcessedPeriodRef.current[gameMode] = nextPeriod;
              if (list.length >= 2) generatePrediction(nextPeriod, list.slice(0,2));
            }
          }
        } catch(e) { console.warn(e); }
      };
      
      fetchData();
      const interval = setInterval(fetchData, 3200);
      return () => clearInterval(interval);
    }, [approvalStatus, gameMode, predictionsMap]);

    // Render registration / approval screens
    if (approvalStatus !== 'approved') {
      return (
        <div className="mobile-container blood-bg h-full flex flex-col">
          <div className="scroll-content flex flex-col justify-center items-center">
            <h1 className="text-3xl font-black blood-text mb-2 text-center">MADARA UCHIHA</h1>
            <p className="text-red-500/70 text-xs tracking-widest mb-6">PREDICTION AI · SDD ALGORITHM</p>
            
            <div className="card-red-glow p-6 w-full max-w-sm">
              {approvalStatus === null && (
                <>
                  <p className="text-center text-red-300 font-bold mb-4">🔐 REGISTRATION REQUIRED</p>
                  <p className="text-xs text-gray-300 mb-4 text-center">To unlock the Sharingan prediction power, register on our partner site first.</p>
                  <a href={REGISTER_URL} target="_blank" rel="noopener noreferrer" className="btn-blood block text-center mb-3">REGISTER NOW</a>
                  <button onClick={() => setShowUidModal(true)} className="w-full bg-black/40 border border-red-700 rounded-full py-3 text-red-400 font-bold text-sm">I have already registered</button>
                </>
              )}
              {approvalStatus === 'pending' && (
                <>
                  <div className="text-center text-yellow-400 font-bold text-lg mb-2">⏳ PENDING APPROVAL</div>
                  <p className="text-xs text-gray-300 mb-4 text-center">Your request (UID: {uidInput || '—'}) is awaiting admin review.</p>
                  <p className="text-xs text-red-400 mb-2 text-center">Contact admin for faster approval:</p>
                  <a href={TELEGRAM_ADMIN} target="_blank" className="block w-full bg-blue-900/40 border border-blue-700 rounded-full py-3 text-blue-300 font-bold text-sm text-center">📱 CONTACT ADMIN</a>
                  <button onClick={checkApprovalStatus} className="w-full mt-3 bg-black/40 border border-red-700 rounded-full py-2 text-red-400 text-xs">Check Again</button>
                </>
              )}
              {approvalStatus === 'rejected' && (
                <>
                  <div className="text-center text-red-600 font-bold text-lg mb-2">🚫 ACCESS DENIED</div>
                  <p className="text-xs text-gray-300 mb-4 text-center">Your request was rejected. Please contact support.</p>
                  <a href={TELEGRAM_ADMIN} target="_blank" className="block w-full bg-red-900/40 border border-red-700 rounded-full py-3 text-red-300 font-bold text-sm text-center">CONTACT SUPPORT</a>
                </>
              )}
            </div>
            <div className="mt-4 text-[10px] text-red-800/60">Device ID: {deviceId.substring(0,12)}...</div>
          </div>

          {/* UID Input Modal */}
          {showUidModal && (
            <div className="dialog-overlay" onClick={() => setShowUidModal(false)}>
              <div className="dialog-card" onClick={e => e.stopPropagation()}>
                <h3 className="blood-text text-xl mb-4">ENTER YOUR UID</h3>
                <p className="text-xs text-gray-400 mb-2">After registration, you received a numeric UID.</p>
                <input type="text" inputMode="numeric" pattern="\d*" placeholder="e.g. 12345678" className="w-full bg-black/60 border border-red-700 rounded-2xl p-3 text-center text-red-300 font-mono text-sm mb-4" value={uidInput} onChange={(e) => setUidInput(e.target.value.replace(/\D/g,''))} />
                <button onClick={submitUidRequest} disabled={isSubmitting} className="btn-blood mb-2">{isSubmitting ? 'SUBMITTING...' : 'SUBMIT REQUEST'}</button>
                <button onClick={() => setShowUidModal(false)} className="w-full bg-transparent border border-red-800 rounded-full py-2 text-red-400 text-xs">CANCEL</button>
              </div>
            </div>
          )}
          <div id="global-toast" className="toast-message"></div>
        </div>
      );
    }

    // === APPROVED USER: MAIN PREDICTION APP ===
    const currentPrediction = predictionsMap[gameMode];
    const currentPeriod = periodsMap[gameMode];

    const PredictionDisplay = () => {
      if (isAnalyzing && !currentPrediction) return ( 
        <div className="sharingan-container"><div className="sharingan-base"><div className="sharingan-ring"></div><div className="tomoe tomoe-1"></div><div className="tomoe tomoe-2"></div><div className="tomoe tomoe-3"></div><div className="sharingan-pupil"></div><div className="prediction-overlay"><div className="text-red-500 text-sm font-bold animate-pulse tracking-wider">ANALYZING...</div></div></div></div> 
      );
      if (currentPrediction) return ( 
        <div className="sharingan-container"><div className="sharingan-base"><div className="sharingan-ring"></div><div className="tomoe tomoe-1"></div><div className="tomoe tomoe-2"></div><div className="tomoe tomoe-3"></div><div className="sharingan-pupil"></div><div className="prediction-overlay"><div className={`prediction-result-text ${predictionReveal ? 'animate-[resultPulse_0.6s_ease-out]' : ''}`}>{currentPrediction.result}</div></div></div><div className="confidence-ring">⚡ {currentPrediction.confidence}% Confidence</div></div> 
      );
      return ( 
        <div className="sharingan-container opacity-70"><div className="sharingan-base"><div className="sharingan-ring"></div><div className="tomoe tomoe-1"></div><div className="tomoe tomoe-2"></div><div className="tomoe tomoe-3"></div><div className="sharingan-pupil"></div><div className="prediction-overlay"><div className="text-red-600/60 text-xs">AWAITING PERIOD</div></div></div></div> 
      );
    };

    const renderContent = () => {
      if (activeTab === 'predict') {
        return ( 
          <div className="flex flex-col items-center py-4">
            <div className="mode-switch w-full max-w-[260px] mb-6">
              <div onClick={() => setGameMode('30S')} className={`mode-option ${gameMode === '30S' ? 'active' : ''}`}>30 SEC</div>
              <div onClick={() => setGameMode('1M')} className={`mode-option ${gameMode === '1M' ? 'active' : ''}`}>1 MIN</div>
            </div>
            <div className="text-center mb-4">
              <p className="text-gray-400 text-[10px] tracking-widest">CURRENT PERIOD</p>
              <p className="font-mono text-lg font-bold text-red-500 bg-black/40 px-3 py-1 rounded-full inline-block">{currentPeriod}</p>
            </div>
            <div className="timer-display">{String(Math.floor(timer/60)).padStart(2,'0')}:{String(timer%60).padStart(2,'0')}</div>
            <div className="mb-6"><PredictionDisplay /></div>
            {currentPrediction && (
              <div className="flex gap-4 mb-4">
                <div className="text-center"><p className="text-[10px] text-red-400 mb-1">OMNI NUM</p><div className="number-ball n1">{currentPrediction.numbers[0]}</div></div>
                <div className="text-center"><p className="text-[10px] text-red-400 mb-1">BACKUP</p><div className="number-ball n2">{currentPrediction.numbers[1]}</div></div>
              </div>
            )}
            <div className="text-[10px] text-red-400/80 bg-black/40 rounded-full px-4 py-2 text-center max-w-[280px]">🔮 Sharingan activated • SDD Algorithm • Auto-updates</div>
          </div> 
        );
      }
      if (activeTab === 'dashboard') {
        return ( 
          <div className="space-y-4">
            <div className="grid grid-cols-2 gap-3">
              <div className="stat-card-blood"><div className="text-gray-400 text-[10px] uppercase tracking-wider">Accuracy</div><div className="text-2xl font-extrabold text-red-500">{stats.accuracy}%</div></div>
              <div className="stat-card-blood"><div className="text-gray-400 text-[10px] uppercase tracking-wider">Predictions</div><div className="text-2xl font-extrabold text-white">{stats.total}</div></div>
              <div className="stat-card-blood"><div className="text-gray-400 text-[10px] uppercase tracking-wider">Wins</div><div className="text-2xl font-extrabold text-red-400">{stats.wins}</div></div>
              <div className="stat-card-blood"><div className="text-gray-400 text-[10px] uppercase tracking-wider">Losses</div><div className="text-2xl font-extrabold text-red-800">{stats.losses}</div></div>
            </div>
            <div className="card-red-glow p-4 text-center">
              <div className="text-gray-400 text-[9px] tracking-[0.2em]">ACTIVE MODE</div>
              <div className="text-xl font-black blood-text">{gameMode === '30S' ? '⚡ 30 SECONDS (SHARINGAN)' : '🔥 1 MINUTE'}</div>
              <div className="text-red-500 text-xs font-mono mt-1">Period: {currentPeriod}</div>
            </div>
            <div className="card-red-glow p-3"><div className="flex justify-between"><span className="text-red-300 text-xs">ACCESS STATUS</span><span className="font-mono text-green-400 font-bold text-xs">APPROVED</span></div></div>
          </div> 
        );
      }
      if (activeTab === 'history') {
        return ( 
          <div>
            <h3 className="blood-text text-xl font-black mb-3">📜 BATTLE LOG</h3>
            {history.length === 0 ? <div className="card-red-glow p-8 text-center text-red-400/50">No predictions yet</div> : history.map((h, idx) => ( 
              <div key={idx} className={`history-item-blood ${h.status === 'WIN' || h.status === 'JACKPOT' ? 'win' : (h.status === 'LOSS' ? 'loss' : '')}`}>
                <div><p className="font-mono text-[10px] text-red-300">{h.period}</p><p className="text-[9px] text-red-500/80">{h.mode === '30S' ? '⚡30S' : '🔥1M'}</p></div>
                <div><p className={`font-black text-xl ${h.result === 'BIG' ? 'text-red-500' : 'text-orange-400'}`}>{h.result}</p><p className="text-[9px] text-gray-400">{h.numbers?.join(',')}</p></div>
                <div className={`px-2 py-0.5 rounded-full text-[9px] font-bold ${h.status === 'JACKPOT' ? 'bg-purple-600 text-white' : (h.status === 'WIN' ? 'bg-red-900/40 text-red-400' : (h.status === 'LOSS' ? 'bg-red-950/60 text-red-300' : 'bg-gray-800 text-gray-400'))}`}>{h.status || 'WAIT'}</div>
              </div> 
            ))}
          </div> 
        );
      }
      if (activeTab === 'profile') {
        return ( 
          <div className="space-y-4">
            <div className="card-red-glow p-5 text-center"><div className="w-16 h-16 rounded-full bg-gradient-to-br from-red-700 to-red-900 mx-auto mb-2 flex items-center justify-center shadow-[0_0_15px_red]"><span className="font-black text-2xl">舞</span></div><h3 className="blood-text text-lg font-black">MADARA UCHIHA</h3><p className="text-red-400 text-[10px]">Eternal Mangekyō Member</p></div>
            <div className="card-red-glow p-4">
              <h4 className="font-black text-red-500 border-b border-red-800 pb-2 mb-2">⚔️ SHINOBI INFO</h4>
              <div className="mb-2"><p className="text-gray-400 text-[10px]">Device ID</p><p className="font-mono text-[10px] text-red-400 break-all">{deviceId}</p></div>
              <div><p className="text-gray-400 text-[10px]">Approval</p><p className="font-mono text-xs text-green-400">GRANTED</p></div>
            </div>
            <button onClick={() => { localStorage.removeItem('madara_device_id'); window.location.reload(); }} className="btn-outline-blood text-sm">⚡ RESET DEVICE</button>
          </div> 
        );
      }
      return null;
    };

    return (
      <div className="mobile-container h-full flex flex-col">
        <div className="flex justify-between items-center p-3 border-b border-red-800/60 bg-black/30 backdrop-blur-sm">
          <div><h1 className="text-xl font-black blood-text tracking-wider">MADARA<span className="text-red-600"> UCHIHA</span></h1><p className="text-[7px] text-red-500/70 tracking-[0.2em]">PREDICTION AI · SDD VERSE</p></div>
          <div className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-green-600 animate-pulse"></div><span className="text-green-400 text-[9px] font-bold">APPROVED</span></div>
        </div>
        <div className="scroll-content">{renderContent()}</div>
        <div className="bottom-nav-blood">
          <div className="flex justify-around max-w-md mx-auto">
            {['dashboard','predict','history','profile'].map(id => (
              <div key={id} onClick={() => setActiveTab(id)} className={`nav-item-blood ${activeTab === id ? 'active' : ''}`}>
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" className="w-5 h-5"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d={id === 'dashboard' ? 'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6' : id === 'predict' ? 'M13 10V3L4 14h7v7l9-11h-7z' : id === 'history' ? 'M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z' : 'M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z'} /></svg>
                <span>{id === 'dashboard' ? 'DOJO' : id === 'predict' ? 'PREDICT' : id === 'history' ? 'HISTORY' : 'AKATSUKI'}</span>
              </div>
            ))}
          </div>
        </div>
        <div id="global-toast" className="toast-message"></div>
      </div>
    );
  };

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
